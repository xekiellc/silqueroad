<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Silque Road</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inconsolata:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0806;
      --obsidian: #111009;
      --charcoal: #1c1a16;
      --gold: #c9a84c;
      --gold-dim: #8a6e2a;
      --gold-pale: #e8d08a;
      --cream: #f0e8d8;
      --cream-dim: #9a907e;
      --border: rgba(201, 168, 76, 0.15);
      --border-hover: rgba(201, 168, 76, 0.35);
      --green: #2a6b3a;
      --green-text: #6fcf7f;
      --red: #8b2222;
      --red-text: #e07070;
      --yellow-text: #f0c040;
      --yellow-border: #7a6010;
    }

    body {
      background-color: var(--black);
      color: var(--cream);
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      min-height: 100vh;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      z-index: 100;
    }

    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-box {
      width: 100%;
      max-width: 380px;
      background: var(--charcoal);
      border: 1px solid var(--border);
      padding: 48px 40px;
    }

    .login-logo {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .login-sub {
      font-family: 'Inconsolata', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: var(--cream-dim);
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    .login-box h2 {
      font-size: 1.3rem;
      font-weight: 300;
      color: var(--cream);
      margin-bottom: 24px;
    }

    .login-group { margin-bottom: 16px; }

    .login-group label {
      display: block;
      font-family: 'Inconsolata', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 8px;
    }

    .login-group input {
      width: 100%;
      background: var(--obsidian);
      border: 1px solid var(--border);
      color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      padding: 11px 14px;
      outline: none;
      border-radius: 0;
      -webkit-appearance: none;
      transition: border-color 0.2s;
    }

    .login-group input:focus { border-color: var(--gold-dim); }

    .login-btn {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--gold-dim);
      color: var(--gold-pale);
      font-family: 'Inconsolata', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .login-btn:hover { background: var(--gold); color: var(--black); border-color: var(--gold); }

    .login-error {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(139,34,34,0.15);
      border: 1px solid var(--red);
      color: var(--red-text);
      font-size: 0.85rem;
      text-align: center;
    }

    #adminDashboard { display: none; }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 40px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--black);
      z-index: 50;
    }

    .admin-header-left { display: flex; flex-direction: column; gap: 2px; }

    .admin-logo {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .admin-label {
      font-family: 'Inconsolata', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.25em;
      color: var(--cream-dim);
      text-transform: uppercase;
    }

    .logout-btn {
      font-family: 'Inconsolata', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--cream-dim);
      background: none;
      border: 1px solid var(--border);
      padding: 8px 16px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .logout-btn:hover { color: var(--red-text); border-color: var(--red); }

    .admin-body { padding: 40px; max-width: 1100px; margin: 0 auto; }

    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }

    .stat-card {
      flex: 1;
      min-width: 120px;
      background: var(--charcoal);
      border: 1px solid var(--border);
      padding: 18px 20px;
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 300;
      color: var(--gold-pale);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-family: 'Inconsolata', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--cream-dim);
    }

    .filter-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filter-tab {
      font-family: 'Inconsolata', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 8px 18px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--cream-dim);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-tab:hover { border-color: var(--border-hover); color: var(--cream); }
    .filter-tab.active { background: var(--gold); color: var(--black); border-color: var(--gold); }

    .app-list { display: flex; flex-direction: column; gap: 12px; }

    .app-card {
      background: var(--charcoal);
      border: 1px solid var(--border);
      padding: 24px 28px;
      transition: border-color 0.2s;
    }

    .app-card:hover { border-color: var(--border-hover); }

    .app-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .app-business {
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--cream);
      margin-bottom: 2px;
    }

    .app-meta {
      font-family: 'Inconsolata', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--cream-dim);
    }

    .status-badge {
      font-family: 'Inconsolata', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 5px 12px;
      border: 1px solid;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .status-badge.new { color: var(--yellow-text); border-color: var(--yellow-border); background: rgba(122,96,16,0.15); }
    .status-badge.reviewed { color: #80b0e0; border-color: #2a5080; background: rgba(42,80,128,0.15); }
    .status-badge.approved { color: var(--green-text); border-color: var(--green); background: rgba(42,107,58,0.15); }
    .status-badge.rejected { color: var(--red-text); border-color: var(--red); background: rgba(139,34,34,0.15); }

    .app-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 24px;
      margin-bottom: 16px;
      font-size: 0.88rem;
      color: var(--cream-dim);
      line-height: 1.5;
    }

    @media (max-width: 600px) {
      .app-details { grid-template-columns: 1fr; }
      .admin-header { padding: 20px; }
      .admin-body { padding: 20px; }
    }

    .app-detail-label {
      font-family: 'Inconsolata', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 2px;
    }

    .app-description { grid-column: 1 / -1; }

    .app-actions {
      display: flex;
      gap: 8px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .action-btn {
      font-family: 'Inconsolata', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 8px 18px;
      border: 1px solid;
      background: transparent;
      cursor: pointer;
      transition: all 0.15s;
    }

    .action-btn.approve { color: var(--green-text); border-color: var(--green); }
    .action-btn.approve:hover { background: var(--green); color: white; }
    .action-btn.reject { color: var(--red-text); border-color: var(--red); }
    .action-btn.reject:hover { background: var(--red); color: white; }
    .action-btn.review { color: #80b0e0; border-color: #2a5080; }
    .action-btn.review:hover { background: #2a5080; color: white; }
    .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .email-link {
      color: var(--gold-dim);
      text-decoration: none;
      transition: color 0.15s;
    }
    .email-link:hover { color: var(--gold); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--cream-dim);
      font-style: italic;
      font-size: 1rem;
    }

    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--cream-dim);
      font-family: 'Inconsolata', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 1px solid rgba(201,168,76,0.3);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      padding: 14px 20px;
      font-family: 'Inconsolata', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid;
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: rgba(42,107,58,0.9); border-color: var(--green); color: var(--green-text); }
    .toast.error { background: rgba(139,34,34,0.9); border-color: var(--red); color: var(--red-text); }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Silque Road</div>
    <div class="login-sub">Admin Access</div>
    <h2>Sign in</h2>
    <div class="login-group">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter') login()" />
    </div>
    <button class="login-btn" onclick="login()">Enter Dashboard</button>
    <div class="login-error" id="loginError">Incorrect password. Try again.</div>
  </div>
</div>

<div id="adminDashboard">
  <header class="admin-header">
    <div class="admin-header-left">
      <span class="admin-logo">Silque Road</span>
      <span class="admin-label">Admin Dashboard</span>
    </div>
    <button class="logout-btn" onclick="logout()">Log Out</button>
  </header>

  <div class="admin-body">
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-number" id="statTotal">—</div>
        <div class="stat-label">Total Applications</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statNew">—</div>
        <div class="stat-label">Pending Review</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statApproved">—</div>
        <div class="stat-label">Approved</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="statRejected">—</div>
        <div class="stat-label">Rejected</div>
      </div>
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
      <button class="filter-tab" onclick="setFilter('new', this)">Pending</button>
      <button class="filter-tab" onclick="setFilter('reviewed', this)">Reviewed</button>
      <button class="filter-tab" onclick="setFilter('approved', this)">Approved</button>
      <button class="filter-tab" onclick="setFilter('rejected', this)">Rejected</button>
    </div>

    <div class="app-list" id="appList">
      <div class="loading-state"><span class="spinner"></span>Loading applications...</div>
    </div>
  </div>

  <footer style="border-top:1px solid var(--border);padding:20px 40px;text-align:center;font-family:'Inconsolata',monospace;font-size:0.55rem;letter-spacing:0.2em;color:var(--cream-dim);opacity:0.4;text-transform:uppercase;">
    Silque Road, LLC &nbsp;&bull;&nbsp; Ohio Charter No. 5591799 &nbsp;&bull;&nbsp; An Ohio limited liability company
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://pmtfqbefrsplvoriirru.supabase.co';
  const SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBtdGZxYmVmcnNwbHZvcmlpcnJ1Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTgzOTkzMSwiZXhwIjoyMDkxNDE1OTMxfQ.4WN8uqRF0pVbkTnhAck4d-Narq8d0zXbjhfKijnsweI';
  const ADMIN_PASSWORD = 'SilqueAdmin2026!';

  let allApplications = [];
  let currentFilter = 'all';

  function login() {
    const pw = document.getElementById('passwordInput').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminDashboard').style.display = 'block';
      loadApplications();
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    }
  }

  function logout() {
    document.getElementById('adminDashboard').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('passwordInput').value = '';
    document.getElementById('loginError').style.display = 'none';
  }

  async function loadApplications() {
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/seller_applications?select=*&order=created_at.desc`,
        { headers: { 'apikey': SERVICE_KEY, 'Authorization': `Bearer ${SERVICE_KEY}` } }
      );
      allApplications = await res.json();
      updateStats();
      renderApplications();
    } catch (err) {
      document.getElementById('appList').innerHTML =
        '<div class="empty-state">Failed to load applications.</div>';
    }
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = allApplications.length;
    document.getElementById('statNew').textContent = allApplications.filter(a => a.status === 'new').length;
    document.getElementById('statApproved').textContent = allApplications.filter(a => a.status === 'approved').length;
    document.getElementById('statRejected').textContent = allApplications.filter(a => a.status === 'rejected').length;
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderApplications();
  }

  function renderApplications() {
    const filtered = currentFilter === 'all'
      ? allApplications
      : allApplications.filter(a => a.status === currentFilter);

    const list = document.getElementById('appList');

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state">No applications in this category.</div>';
      return;
    }

    list.innerHTML = filtered.map(app => `
      <div class="app-card" id="card-${app.id}">
        <div class="app-card-header">
          <div>
            <div class="app-business">${esc(app.business_name)}</div>
            <div class="app-meta">${formatDate(app.created_at)}</div>
          </div>
          <span class="status-badge ${app.status}">${app.status}</span>
        </div>

        <div class="app-details">
          <div>
            <div class="app-detail-label">Contact</div>
            <div>${esc(app.contact_name || '—')}</div>
          </div>
          <div>
            <div class="app-detail-label">Email</div>
            <div><a class="email-link" href="mailto:${esc(app.email)}">${esc(app.email || '—')}</a></div>
          </div>
          <div>
            <div class="app-detail-label">Category</div>
            <div>${esc(app.category || '—')}</div>
          </div>
          <div>
            <div class="app-detail-label">Monthly Volume</div>
            <div>${esc(app.monthly_volume || '—')}</div>
          </div>
          <div>
            <div class="app-detail-label">Website</div>
            <div>${app.website ? `<a class="email-link" href="${esc(app.website)}" target="_blank">${esc(app.website)}</a>` : '—'}</div>
          </div>
          <div>
            <div class="app-detail-label">Crypto</div>
            <div>${esc(app.crypto_currency || '—')}${app.crypto_wallet ? ' · ' + esc(app.crypto_wallet) : ''}</div>
          </div>
          <div class="app-description">
            <div class="app-detail-label">Products</div>
            <div>${esc(app.products_description || '—')}</div>
          </div>
          ${app.notes ? `
          <div class="app-description">
            <div class="app-detail-label">Notes</div>
            <div>${esc(app.notes)}</div>
          </div>` : ''}
        </div>

        <div class="app-actions">
          <button class="action-btn approve" onclick="updateStatus('${app.id}', 'approved', ${JSON.stringify(app)})" ${app.status === 'approved' ? 'disabled' : ''}>✓ Approve</button>
          <button class="action-btn review" onclick="updateStatus('${app.id}', 'reviewed', null)" ${app.status === 'reviewed' ? 'disabled' : ''}>Mark Reviewed</button>
          <button class="action-btn reject" onclick="updateStatus('${app.id}', 'rejected', null)" ${app.status === 'rejected' ? 'disabled' : ''}>✕ Reject</button>
        </div>
      </div>
    `).join('');
  }

  async function updateStatus(id, newStatus, appData) {
    try {
      // Update application status
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/seller_applications?id=eq.${id}`,
        {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SERVICE_KEY,
            'Authorization': `Bearer ${SERVICE_KEY}`,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ status: newStatus })
        }
      );

      if (!res.ok) throw new Error('Update failed');

      if (newStatus === 'approved' && appData) {
        // Auto-create seller record
        try {
          await fetch(`${SUPABASE_URL}/rest/v1/sellers`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SERVICE_KEY,
              'Authorization': `Bearer ${SERVICE_KEY}`,
              'Prefer': 'return=minimal'
            },
            body: JSON.stringify({
              business_name: appData.business_name,
              contact_name: appData.contact_name || null,
              email: appData.email,
              category: appData.category || null,
              crypto_wallet: appData.crypto_wallet || null,
              crypto_currency: appData.crypto_currency || null,
              commission_rate: 0.10,
              status: 'approved'
            })
          });
        } catch (sellerErr) {
          console.error('Seller record creation failed:', sellerErr);
          // Non-fatal — continue with notification
        }

        // Fire approval notification email
        try {
          await fetch('/.netlify/functions/send-notification', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              type: 'seller_approved',
              data: {
                email: appData.email,
                business_name: appData.business_name
              }
            })
          });
        } catch (notifErr) {
          console.error('Approval notification failed:', notifErr);
        }
      }

      const app = allApplications.find(a => a.id === id);
      if (app) app.status = newStatus;

      updateStats();
      renderApplications();
      showToast(
        newStatus === 'approved'
          ? 'Approved — seller record created & notified'
          : `Marked as ${newStatus}`,
        'success'
      );

    } catch (err) {
      showToast('Update failed — try again', 'error');
    }
  }

  function showToast(message, type) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `toast ${type} show`;
    setTimeout(() => { toast.className = `toast ${type}`; }, 3000);
  }

  function formatDate(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
